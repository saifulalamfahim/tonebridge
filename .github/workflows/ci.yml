name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests and build verification
        run: npm run check
      - name: Upload verified unpacked extension
        uses: actions/upload-artifact@v4
        with:
          name: tonebridge-extension-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
