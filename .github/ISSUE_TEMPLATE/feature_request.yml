name: Feature request
description: Suggest an improvement to ToneBridge
title: '[Feature]: '
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Privacy and tone impact
      description: Could this send, store, add, remove, or change user information?
    validations:
      required: true
