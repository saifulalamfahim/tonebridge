name: Bug report
description: Report a reproducible ToneBridge problem
title: '[Bug]: '
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Privacy check
      options:
        - label: I removed private messages, API keys, and personal information from this report.
          required: true
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: input
    attributes:
      label: ToneBridge version
      placeholder: v0.3.0
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Browser
      options: [Chrome, Edge, Other Chromium browser]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
      description: Use invented, non-sensitive example text.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Relevant error
      description: Paste only errors that do not contain secrets or private text.
